# Dependencies must also be added to LicensesDialog.java

[versions]
morphe-patcher = "1.3.3"
morphe-patches-library = "1.2.0"
# Tracking https://github.com/google/smali/issues/100.
smali = "b6365a84f4"
agp = "9.1.0"
gson = "2.13.2"
guava = "33.5.0-jre"

[libraries]
gson = { module = "com.google.code.gson:gson", version.ref = "gson" }
guava = { module = "com.google.guava:guava", version.ref = "guava" }
morphe-patches-library = { module = "app.morphe:morphe-patches-library", version.ref = "morphe-patches-library" }

[plugins]
android-library = { id = "com.android.library", version.ref = "agp" }
morphe-patches = { id = "app.morphe.patches", version.ref = "morphe-patcher" }